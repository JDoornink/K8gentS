apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8gents.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "k8gents.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "k8gents.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "k8gents.fullname" . }}
    spec:
      serviceAccountName: {{ include "k8gents.fullname" . }}-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
      containers:
        - name: agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: AGENT_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: WATCH_NAMESPACES
              value: {{ .Values.agent.watchNamespaces | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.agent.logLevel | quote }}
            - name: REMEDIATION_MODE
              value: {{ .Values.agent.remediationMode | quote }}
            - name: ALLOWED_APPROVERS
              valueFrom:
                secretKeyRef:
                  name: {{ include "k8gents.fullname" . }}-secrets
                  key: ALLOWED_APPROVERS
            - name: AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "k8gents.fullname" . }}-secrets
                  key: AI_API_KEY
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "k8gents.fullname" . }}-secrets
                  key: SLACK_BOT_TOKEN
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "k8gents.fullname" . }}-secrets
                  key: SLACK_APP_TOKEN
            - name: SLACK_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "k8gents.fullname" . }}-secrets
                  key: SLACK_CHANNEL_ID
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
