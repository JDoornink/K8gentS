apiVersion: v1
kind: Namespace
metadata:
  name: rca-agent-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-nginx-deployment
  namespace: rca-agent-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-nginx
  template:
    metadata:
      labels:
        app: broken-nginx
    spec:
      containers:
      - name: nginx
        # Intentional Error: This image tag does not exist!
        image: nginx:1.999.0-invalid-tag
        ports:
        - containerPort: 80
