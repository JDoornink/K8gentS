apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8gent-sa
  namespace: k8gent-system
---
# ─── Executor Service Account ──────────────────────────────────────────────────
# This SA is used exclusively by short-lived remediation Jobs, NOT by the agent pod.
# Write permissions (delete pods, patch deployments) live here and nowhere else.
# The Job pod exists for ~5-30 seconds, then exits. ttlSecondsAfterFinished cleans it up.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8gent-executor-sa
  namespace: k8gent-system
---
# ─── Read-Only Role ────────────────────────────────────────────────────────────
# Always applied. The agent pod can observe the cluster but cannot mutate anything.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8gent-readonly-role
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - namespaces
      - nodes
      - events
      - services
      - endpoints
      - persistentvolumes
      - persistentvolumeclaims
      - configmaps
      - secrets # Needed for deep RCA (e.g., verifying secret existence). Remove if too broad.
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8gent-readonly-binding
subjects:
  - kind: ServiceAccount
    name: k8gent-sa
    namespace: k8gent-system
roleRef:
  kind: ClusterRole
  name: k8gent-readonly-role
  apiGroup: rbac.authorization.k8s.io
---
# ─── Job Creator Role ──────────────────────────────────────────────────────────
# Namespaced (not cluster-wide): agent can only spawn Jobs inside k8gent-system.
# This is the only write permission the agent pod itself ever holds.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8gent-job-creator-role
  namespace: k8gent-system
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8gent-job-creator-binding
  namespace: k8gent-system
subjects:
  - kind: ServiceAccount
    name: k8gent-sa
    namespace: k8gent-system
roleRef:
  kind: Role
  name: k8gent-job-creator-role
  apiGroup: rbac.authorization.k8s.io
---
# ─── Remediation Role ──────────────────────────────────────────────────────────
# Scoped to the minimum verbs needed for the three supported remediation actions:
#   - delete_pod:       delete on pods
#   - set_image:        patch on deployments
#   - rollout_restart:  patch on deployments
# Intentionally excludes: namespaces, secrets, daemonsets, statefulsets, and all
# delete on deployments. Bound to k8gent-executor-sa ONLY — never to k8gent-sa.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8gent-remediation-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]
---
# Bound to the executor SA — the write-capable identity used only inside Job pods.
# To fully disable remediation without code changes:
#   kubectl delete clusterrolebinding k8gent-remediation-binding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8gent-remediation-binding
subjects:
  - kind: ServiceAccount
    name: k8gent-executor-sa   # <-- executor SA, NOT the main agent SA
    namespace: k8gent-system
roleRef:
  kind: ClusterRole
  name: k8gent-remediation-role
  apiGroup: rbac.authorization.k8s.io
