apiVersion: v1
kind: Secret
metadata:
  name: {{ include "k8gents.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  ALLOWED_APPROVERS: {{ .Values.secrets.allowedApprovers | quote }}
  AI_API_KEY: {{ .Values.secrets.aiApiKey | quote }}
  SLACK_BOT_TOKEN: {{ .Values.secrets.slackBotToken | quote }}
  SLACK_APP_TOKEN: {{ .Values.secrets.slackAppToken | quote }}
  SLACK_CHANNEL_ID: {{ .Values.secrets.slackChannelId | quote }}
